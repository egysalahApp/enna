        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* * سلوك التمرير الدقيق (Scroll Behavior)
         * إضافة هامش علوي وهمي لحاوية القسم لتعويض ارتفاع شريط التبويبات الثابت.
         */
        .tab-content {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease-out;
            scroll-margin-top: 85px; /* تعويض ارتفاع الـ Sticky Nav */

            display: block;

            transform: translateY(0);

        /* منع التفاعل مع الأزرار بعد الإجابة */

            let shuffled = [...array];

                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                    { q: 'إنّ العلمَ (قبلَ) المال. نوع الخبر:', type: 'mcq', options: ['شبه جملة (ظرف)', 'مفرد', 'جملة فعلية'], correct: 'شبه جملة (ظرف)', hint: 'الكلمة بين القوسين تدل على زمان أو مكان.', exp: 'الخبر هنا شبه جملة لأنه يبدأ بظرف (قبلَ).' },
                    { q: 'إنّ النظافةَ (من الإيمان). نوع الخبر:', type: 'mcq', options: ['مفرد', 'شبه جملة (جار ومجرور)', 'جملة اسمية'], correct: 'شبه جملة (جار ومجرور)', hint: 'انظر إلى الكلمة الأولى بين القوسين.', exp: 'الخبر شبه جملة لأنه مكون من حرف جر (من) واسم مجرور (الإيمان).' },
                    { q: 'خبر ليت في جملة (ليت الشبابَ يعودُ يومًا) هو كلمة (يومًا).', type: 'tf', options: ['صواب', 'خطأ'], correct: 'خطأ', hint: 'ابحث عن الكلمة التي أتمت المعنى الأساسي للجملة بعد اسم ليت.', exp: 'الخبر هو الجملة الفعلية (يعودُ)، أما كلمة (يومًا) فهي ظرف زمان مفعول فيه.' },
                    { q: 'لعلّ (في السفرِ) الخيرَ. نوع الخبر:', type: 'mcq', options: ['مفرد', 'شبه جملة (جار ومجرور)', 'جملة فعلية'], correct: 'شبه جملة (جار ومجرور)', hint: 'الخبر هنا تقدم على الاسم، وبدأ بحرف جر.', exp: 'الخبر شبه جملة لأنه مكون من الجار والمجرور (في السفرِ).' },
                    { q: 'إنّ محمدًا (لَناجحٌ). نوع الخبر:', type: 'mcq', options: ['مفرد', 'شبه جملة', 'جملة فعلية'], correct: 'مفرد', hint: 'اللام مفتوحة (للتوكيد) وليست حرف جر؛ فهي لا تؤثر على الإعراب.', exp: 'الخبر هو (ناجحٌ) وهو مفرد. واللام المتصلة به هي لام التوكيد ولا تجعله شبه جملة.' }
                ]
            }
        ];

        let appState = {
            sections: {},
            totalQuestionsCount: 0
        };

        function initAppState() {
            quizData.forEach(sec => {
                appState.sections[sec.id] = {
                    score: 0,
                    answeredCount: 0,
                    totalQuestions: sec.questions.length,
                    answeredQuestions: new Set()
                };
                appState.totalQuestionsCount += sec.questions.length;
            });
        }

        // ==========================================
        // الدالة الموحدة لتبديل التبويبات وإدارة التمرير
        // ==========================================
        function switchTab(targetId) {
            // إخفاء كافة التبويبات وإزالة التنسيق النشط
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-brand-600', 'text-brand-700', 'bg-brand-50');
                b.classList.add('border-transparent', 'text-slate-500');
            });

            // إظهار التبويب المطلوب
            const panel = document.getElementById(`panel-${targetId}`);
            if (panel) panel.classList.add('active');
            
            // تمييز زر التبويب النشط
            const activeBtn = document.getElementById(`btn-${targetId}`);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-slate-500');
                activeBtn.classList.add('border-brand-600', 'text-brand-700', 'bg-brand-50');
                // تمرير زر التبويب ليكون مرئياً في الجوال
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // تحديث شريط التقدم للقسم الجديد
            updateProgressBar(targetId);

            // =====================================
            // سلوك التمرير (Scrolling Behavior) الصارم
            // =====================================
            // يجب أن تنتقل الصفحة بسلاسة إلى أعلى محتوى القسم المطلوب فقط
            // دون الذهاب إلى أعلى الصفحة أو إظهار الترويسة
            setTimeout(() => {
                if (panel) {
                    const stickyNav = document.getElementById('sticky-nav');
                    const navHeight = stickyNav ? stickyNav.offsetHeight : 60;
                    
                    // حساب المسافة الدقيقة لبداية محتوى القسم، مخصوماً منها ارتفاع شريط التبويبات
                    const yOffset = panel.getBoundingClientRect().top + window.scrollY - navHeight - 15; // 15px للتنفس البصري
                    
                    window.scrollTo({ top: yOffset, behavior: 'smooth' });
                }
            }, 50); // تأخير بسيط لضمان قيام المتصفح بحساب الأبعاد بعد display: block
        }

        function updateProgressBar(secId) {
            const state = appState.sections[secId];
            if (!state) return;
            const percentage = Math.round((state.answeredCount / state.totalQuestions) * 100);
            document.getElementById('section-progress-bar').style.width = `${percentage}%`;
        }

        function renderApp() {
            const tabsList = document.getElementById('tabs-list');
            const mainContent = document.getElementById('main-content');
            tabsList.innerHTML = '';
            mainContent.innerHTML = '';

            quizData.forEach((sec, index) => {
                const isFirst = index === 0;
                const isLast = index === quizData.length - 1;

                // إنشاء أزرار التبويبات
                const li = document.createElement('li');
                li.className = 'whitespace-nowrap shrink-0';
                li.innerHTML = `
                    <button onclick="switchTab('${sec.id}')" id="btn-${sec.id}" class="tab-btn px-6 py-2 text-lg font-bold border-b-[3px] transition-all duration-300 rounded-t-xl btn-interact ${isFirst ? 'border-brand-600 text-brand-700 bg-brand-50' : 'border-transparent text-slate-500'}">
                        ${sec.title}
                    </button>
                `;
                tabsList.appendChild(li);

                // إنشاء حاوية القسم
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `panel-${sec.id}`;
                sectionDiv.className = `tab-content pt-8 ${isFirst ? 'active' : ''}`;

                // عنوان ترحيبي في التبويب الأول فقط
                if (isFirst) {
                    sectionDiv.innerHTML += `
                        <div class="text-center mb-12 animation-fadeIn">
                            <h2 class="text-5xl font-bold text-slate-900 mb-6">إنّ وأخواتها</h2>
                            <p class="text-slate-600 text-xl leading-relaxed max-w-2xl mx-auto font-medium">
                                مرحبًا بك في هذا التطبيق التفاعلي. اقرأ الأسئلة بعناية، واختر الإجابة الصحيحة. يمكنك الاستعانة بـ (التلميح 💡) إذا واجهت صعوبة.
                            </p>
                        </div>
                    `;
                }

                // حاوية الأسئلة (سيتم رسمها ديناميكياً لضمان الترتيب العشوائي)
                const questionsContainer = document.createElement('div');
                questionsContainer.id = `q-container-${sec.id}`;
                sectionDiv.appendChild(questionsContainer);

                // أزرار نهاية القسم
                let footerBtns = `
                    <button onclick="retrySection('${sec.id}')" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl hover:bg-slate-800 transition-all font-bold flex items-center gap-2 shadow-md btn-interact">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        إعادة المحاولة
                    </button>
                `;
                
                if (!isLast) {
                    footerBtns += `
                        <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-8 py-3.5 rounded-2xl hover:bg-brand-700 transition-all font-bold flex items-center gap-2 shadow-md btn-interact">
                            القسم التالي
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        </button>
                    `;
                } else {
                    footerBtns += `
                        <button onclick="showFinalEvaluation()" id="btn-final-eval" class="hidden bg-emerald-600 text-white px-8 py-3.5 rounded-2xl hover:bg-emerald-700 transition-all font-bold flex items-center gap-2 shadow-md btn-interact">
                            عرض النتيجة النهائية
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    `;
                }

                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-12 p-8 bg-white rounded-3xl shadow-sm border border-slate-100">
                        <div class="text-2xl font-bold text-slate-800 mb-6 sm:mb-0 bg-slate-50 px-6 py-3 rounded-2xl border border-slate-100">
                            درجة القسم: <span id="score-${sec.id}" class="text-brand-600">٠</span> / ${toEasternNum(sec.questions.length)}
                        </div>
                        <div class="flex flex-wrap items-center justify-center gap-3 w-full sm:w-auto">
                            ${footerBtns}
                        </div>
                    </div>
                `;
                
                mainContent.appendChild(sectionDiv);
                
                // رسم الأسئلة مع الترتيب العشوائي
                renderQuestionsHTML(sec.id);
            });
            
            if (quizData.length > 0) updateProgressBar(quizData[0].id);
        }

        // دالة رسم أسئلة القسم (تضمن الترتيب العشوائي للخيارات)
        function renderQuestionsHTML(secId) {
            const sec = quizData.find(s => s.id === secId);
            const container = document.getElementById(`q-container-${secId}`);
            
            const html = sec.questions.map((q, qIndex) => {
                // خلط الخيارات عشوائياً فقط لأسئلة الاختيار من متعدد
                let displayOptions = [...q.options];
                if (q.type !== 'tf') {
                    displayOptions = shuffleArray(displayOptions);
                }

                return `
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-8 transition-all hover:shadow-md" id="card-${secId}-${qIndex}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-5 mb-6">
                            <h3 class="question-text font-bold text-slate-800 leading-relaxed">
                                <span class="text-brand-600 ml-1">السؤال ${toEasternNum(qIndex + 1)}:</span>
                                ${q.q}
                            </h3>
                            <button onclick="toggleHint('${secId}', ${qIndex})" class="flex items-center gap-2 text-amber-600 bg-amber-50 px-5 py-2.5 rounded-2xl hover:bg-amber-100 transition-all shrink-0 font-bold border border-amber-100/50 btn-interact">
                                💡 تلميح
                            </button>
                        </div>
                        
                        <div id="hint-${secId}-${qIndex}" class="hidden mb-6 p-6 bg-amber-50/50 border border-amber-100 text-amber-900 rounded-2xl text-lg font-medium leading-relaxed">
                            ${q.hint}
                        </div>

                        <div class="flex flex-wrap gap-4 mb-2" id="opts-${secId}-${qIndex}">
                            ${displayOptions.map(opt => `
                                <button onclick="selectAnswer('${secId}', ${qIndex}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[160px] text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-4 px-8 rounded-2xl hover:bg-white hover:border-brand-500 hover:text-brand-700 transition-all text-center btn-interact">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        <div id="feedback-${secId}-${qIndex}" class="hidden mt-8 pt-8 border-t border-slate-100">
                            <div id="res-msg-${secId}-${qIndex}" class="font-bold text-2xl mb-4 flex items-center gap-2"></div>
                            <div class="text-slate-700 font-medium leading-relaxed text-lg bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <span class="font-bold text-brand-700 text-xl block mb-2 underline decoration-brand-200 underline-offset-8">التوضيح:</span>
                                ${q.exp}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        // إظهار وإخفاء التلميح
        function toggleHint(secId, qIdx) {
            const hintDiv = document.getElementById(`hint-${secId}-${qIdx}`);
            hintDiv.classList.toggle('hidden');
        }

        // تقييم الإجابة
        function selectAnswer(secId, qIdx, selectedOpt) {
            const state = appState.sections[secId];
            if (state.answeredQuestions.has(qIdx)) return;
            
            state.answeredQuestions.add(qIdx);
            state.answeredCount += 1;
            
            const q = quizData.find(s => s.id === secId).questions[qIdx];
            const isCorrect = selectedOpt === q.correct;
            
            if (isCorrect) state.score += 1;

            // تنسيق الأزرار
            const buttons = document.getElementById(`opts-${secId}-${qIdx}`).querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                if (btn.innerText.trim() === q.correct) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700', 'shadow-md');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            // إظهار التغذية الراجعة
            const feedbackDiv = document.getElementById(`feedback-${secId}-${qIdx}`);
            const msg = document.getElementById(`res-msg-${secId}-${qIdx}`);
            feedbackDiv.classList.remove('hidden');
            
            if (isCorrect) {
                msg.innerHTML = `<svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-600">(إجابة صحيحة)</span>`;
            } else {
                msg.innerHTML = `<svg class="w-8 h-8 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-rose-600">(إجابة خاطئة)</span>`;
            }

            document.getElementById(`score-${secId}`).innerText = toEasternNum(state.score);
            updateProgressBar(secId);
            checkOverallCompletion();
        }

        // إعادة محاولة القسم
        function retrySection(secId) {
            const state = appState.sections[secId];
            state.score = 0;
            state.answeredCount = 0;
            state.answeredQuestions.clear();

            document.getElementById(`score-${secId}`).innerText = toEasternNum(0);
            updateProgressBar(secId);

            // إعادة بناء الأسئلة لضمان العشوائية وتصفير الحالة
            renderQuestionsHTML(secId);
            
            // الانتقال والتمرير إلى أعلى القسم بدقة
            switchTab(secId);
            checkOverallCompletion();
        }

        // التحقق من إنهاء جميع التدريبات لإظهار التقييم النهائي
        function checkOverallCompletion() {
            let totalAnswered = 0;
            for (let k in appState.sections) {
                totalAnswered += appState.sections[k].answeredCount;
            }
            
            const btn = document.getElementById('btn-final-eval');
            if (btn) {
                if (totalAnswered === appState.totalQuestionsCount) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            }
        }

        // إظهار نافذة التقييم النهائي
        function showFinalEvaluation() {
            let totalScore = 0;
            for (let k in appState.sections) {
                totalScore += appState.sections[k].score;
            }
            
            const percentage = Math.round((totalScore / appState.totalQuestionsCount) * 100);
            document.getElementById('final-score-display').innerText = `${toEasternNum(totalScore)} / ${toEasternNum(appState.totalQuestionsCount)}`;
            
            let msg = percentage === 100 ? 'مستوى متميز جدًا! لقد أتقنت جميع قواعد الدرس ببراعة.' : 
                      percentage >= 85 ? 'مستوى جيد جدًا! استيعابك للقواعد ممتاز، استمر في تفوقك.' : 
                      percentage >= 70 ? 'مستوى جيد! إجاباتك موفقة، راجع التوضيحات لتلافي الأخطاء البسيطة.' : 
                      'تحتاج إلى مراجعة الدرس مرة أخرى بتركيز، لا تيأس وحاول من جديد!';
            
            document.getElementById('final-message').innerText = msg;
            
            const modal = document.getElementById('final-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { 
                modal.classList.remove('opacity-0'); 
                modalContent.classList.remove('scale-95'); 
                document.getElementById('final-progress-bar').style.width = `${percentage}%`; 
            }, 10);
        }

        // إغلاق النافذة
        function closeFinalModal() {
            const modal = document.getElementById('final-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('final-progress-bar').style.width = '0%';
            }, 300);
        }

        // تهيئة وبدء التطبيق
        document.addEventListener('DOMContentLoaded', () => { 
            initAppState(); 
            renderApp(); 
        });
    </script>
</body>
</html>
