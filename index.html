        body {
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        
        /* إخفاء شريط التمرير للتبويبات مع الحفاظ على وظيفة التمرير الأفقي */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* * سلوك التمرير الدقيق (Scroll Behavior)
         * إضافة تعويض ارتفاع (offset) 3rem لضمان عدم تغطية التبويبات الثابتة لبداية القسم عند التمرير 
         */
        .tab-content {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease-out;
            scroll-margin-top: 3rem;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        /* منع التفاعل مع الخيارات بعد الإجابة */
        .disabled-btn { pointer-events: none; }
        
        /* نافذة التقييم النهائي (خلفية ضبابية) */

        .btn-interact { transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease; }

            let shuffled = [...array];

                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                    { q: 'لعلّ (في السفرِ) الخيرَ. نوع الخبر:', type: 'mcq', options: ['مفرد', 'شبه جملة (جار ومجرور)', 'جملة فعلية'], correct: 'شبه جملة (جار ومجرور)', hint: 'الخبر هنا تقدم على الاسم، وبدأ بحرف جر.', exp: 'الخبر شبه جملة لأنه مكون من الجار والمجرور (في السفرِ).' },
                    { q: 'إنّ محمدًا (لَناجحٌ). نوع الخبر:', type: 'mcq', options: ['مفرد', 'شبه جملة', 'جملة فعلية'], correct: 'مفرد', hint: 'اللام مفتوحة (للتوكيد) وليست حرف جر؛ فهي لا تؤثر على الإعراب.', exp: 'الخبر هو (ناجحٌ) وهو مفرد. واللام المتصلة به هي لام التوكيد ولا تجعله شبه جملة.' }
                ]
            }
        ];

        let appState = {
            sections: {},
            totalQuestionsCount: 0
        };

        function initAppState() {
            quizData.forEach(sec => {
                const qCount = sec.questions ? sec.questions.length : 0;
                appState.sections[sec.id] = {
                    score: 0,
                    answeredCount: 0,
                    totalQuestions: qCount,
                    answeredQuestions: new Set()
                };
                appState.totalQuestionsCount += qCount;
            });
        }

        // ==========================================
        // الدالة الموحدة لتبديل التبويبات وإدارة التمرير
        // ==========================================
        function switchTab(targetId) {
            // إخفاء كافة التبويبات وإزالة التنسيق النشط
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-brand-700', 'text-brand-800', 'bg-brand-50');
                b.classList.add('border-transparent', 'text-slate-600');
            });

            // إظهار التبويب المطلوب
            const panel = document.getElementById(`panel-${targetId}`);
            if (panel) panel.classList.add('active');
            
            // تمييز زر التبويب النشط وتمريره أفقياً بسلاسة
            const activeBtn = document.getElementById(`btn-${targetId}`);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-slate-600');
                activeBtn.classList.add('border-brand-700', 'text-brand-800', 'bg-brand-50');
                
                // تمرير التبويبات أفقيًا بسلاسة لضمان ظهور التبويب النشط دائمًا على الشاشات الصغيرة
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // تحديث شريط التقدم للقسم الجديد
            updateProgressBar(targetId);

            // =====================================
        // سلوك التمرير (Scrolling Behavior)
        // =====================================
        // استخدام setTimeout لضمان تطبيق العرض وإمكانية حساب الأبعاد بشكل صحيح
        // التمرير يتم بالاعتماد على scroll-margin-top المحددة في CSS
        setTimeout(() => {
            if (panel) {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, 50);
    }

    function updateProgressBar(secId) {
            const state = appState.sections[secId];
            if (!state || state.totalQuestions === 0) {
                document.getElementById('section-progress-bar').style.width = '0%';
                return;
            }
            const percentage = Math.round((state.answeredCount / state.totalQuestions) * 100);
            document.getElementById('section-progress-bar').style.width = `${percentage}%`;
        }

                }

                sectionDiv.innerHTML += `
                    <div class="text-center mb-12">

                `;

                if (sec.type === 'summary') {
                    sectionDiv.innerHTML += `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <!-- البطاقة الأولى: العمل والتأثير -->

                                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>

                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-bold">كأنّ:</span> تفيد التشبيه.</li>

                            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                <div class="flex items-center gap-4 mb-6">
                                    <div class="bg-emerald-100 p-4 rounded-full text-emerald-600">
                                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                    </div>
                                    <h3 class="text-2xl font-bold text-slate-800">أنواع الخبر</h3>
                                </div>
                                <ul class="text-slate-700 text-xl leading-relaxed space-y-3">
                                    <li><span class="font-bold">مفرد:</span> ليس جملة ولا شبه جملة.</li>
                                    <li><span class="font-bold">جملة:</span> اسمية أو فعلية.</li>
                                    <li><span class="font-bold">شبه جملة:</span> ظرف أو جار ومجرور.</li>
                                </ul>
                            </div>
                        </div>

                        <div class="flex justify-center mt-12 mb-8">
                            <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-10 py-5 rounded-2xl font-bold flex items-center gap-3 text-2xl outline-none shadow-md btn-interact">
                                ابدأ التدريبات
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>

                    mainContent.appendChild(sectionDiv);
                    return; // إنهاء حلقة هذا القسم لتجنب رسم أزرار التقييم والأسئلة لتبويب المراجعة
                }

                // حاوية الأسئلة
                const questionsContainer = document.createElement('div');
                questionsContainer.id = `q-container-${sec.id}`;
                sectionDiv.appendChild(questionsContainer);

                // أزرار نهاية القسم
                let footerBtns = `
                    <button onclick="retrySection('${sec.id}')" class="bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 text-xl outline-none btn-interact shadow-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        إعادة المحاولة
                    </button>
                `;
                
                if (!isLast) {
                    footerBtns += `
                        <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 text-xl outline-none btn-interact shadow-sm">
                            القسم التالي
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>

                    `;
                } else {
                    footerBtns += `
                        <button onclick="showFinalEvaluation()" id="btn-final-eval" class="hidden bg-emerald-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 text-xl outline-none btn-interact shadow-sm">

                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-12 p-8 bg-white rounded-[2rem] shadow-sm border border-slate-200">

                        </div>

            if (quizData.length > 0) updateProgressBar(quizData[0].id);

        // دالة رسم أسئلة القسم وتطبيق Shuffle على الخيارات
        function renderQuestionsHTML(secId) {
            const sec = quizData.find(s => s.id === secId);
            if (sec.type === 'summary') return;

            const container = document.getElementById(`q-container-${secId}`);
            
            const html = sec.questions.map((q, qIndex) => {
                // ترتيب عشوائي لأسئلة الاختيار، وترتيب ثابت لأسئلة (صواب / خطأ)
                let displayOptions = [...q.options];
                if (q.type === 'tf') {
                    displayOptions = ['صواب', 'خطأ']; // التثبيت الصارم للترتيب
                } else {
                    displayOptions = shuffleArray(displayOptions); // ترتيب عشوائي للاختيارات المتعددة
                }

                return `
                    <div class="bg-white p-8 sm:p-10 rounded-[2rem] shadow-sm border border-slate-200 mb-10" id="card-${secId}-${qIndex}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-6 mb-8">
                            <h3 class="text-2xl font-bold text-slate-900 leading-relaxed flex-1">
                                <span class="text-brand-700 ml-2">السؤال ${toEasternNum(qIndex + 1)}:</span>
                                ${q.q}
                            </h3>
                            <button onclick="toggleHint('${secId}', ${qIndex})" class="flex items-center gap-2 text-amber-500 bg-amber-50 px-6 py-3 rounded-xl font-bold border border-amber-200 text-xl outline-none shrink-0 btn-interact">
                                💡 تلميح
                            </button>
                        </div>
                        
                        <div id="hint-${secId}-${qIndex}" class="hidden mb-8 p-6 bg-amber-50/80 border border-amber-200 text-amber-900 rounded-2xl text-xl font-medium leading-relaxed">
                            ${q.hint}
                        </div>

                        <!-- استخدام flex-wrap لضمان عدم خروج الأزرار عند التكبير 200% -->
                        <div class="flex flex-wrap gap-4 mb-2" id="opts-${secId}-${qIndex}">
                            ${displayOptions.map(opt => `
                                <button onclick="selectAnswer('${secId}', ${qIndex}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[180px] text-2xl font-bold bg-slate-50 border-2 border-slate-200 text-slate-800 py-5 px-8 rounded-2xl text-center outline-none btn-interact">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        <div id="feedback-${secId}-${qIndex}" class="hidden mt-10 pt-8 border-t border-slate-200">
                            <div id="res-msg-${secId}-${qIndex}" class="font-bold text-3xl mb-4 flex items-center gap-3"></div>
                            <div class="text-slate-800 font-medium leading-relaxed text-2xl bg-slate-50 p-8 rounded-2xl border border-slate-200">
                                <span class="font-bold text-brand-800 text-2xl block mb-3 underline decoration-brand-300 underline-offset-8">التوضيح:</span>
                                ${q.exp}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        // التلميح يظل قابلاً للضغط سواء قبل الإجابة أو بعدها (لأن الإخفاء يتم لأزرار الخيارات فقط)
        function toggleHint(secId, qIdx) {
            const hintDiv = document.getElementById(`hint-${secId}-${qIdx}`);
            hintDiv.classList.toggle('hidden');
        }

        // تقييم الإجابة وعرض التغذية الراجعة
        function selectAnswer(secId, qIdx, selectedOpt) {
            const state = appState.sections[secId];
            if (state.answeredQuestions.has(qIdx)) return; // منع تغيير الإجابة
            
            state.answeredQuestions.add(qIdx);
            state.answeredCount += 1;
            
            const q = quizData.find(s => s.id === secId).questions[qIdx];
            const isCorrect = selectedOpt === q.correct;
            
            if (isCorrect) state.score += 1;

            // تنسيق الأزرار (إيقاف الضغط عنها فقط)
            const buttons = document.getElementById(`opts-${secId}-${qIdx}`).querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                if (btn.innerText.trim() === q.correct) {
                    btn.classList.remove('bg-slate-50', 'text-slate-800', 'border-slate-200');
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-800');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.remove('bg-slate-50', 'text-slate-800', 'border-slate-200');
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-800');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            // إظهار التغذية الراجعة (إجابة صحيحة/خاطئة دون استخدام صواب/خطأ)
            const feedbackDiv = document.getElementById(`feedback-${secId}-${qIdx}`);
            const msg = document.getElementById(`res-msg-${secId}-${qIdx}`);
            feedbackDiv.classList.remove('hidden');
            
            if (isCorrect) {
                msg.innerHTML = `<svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-700">(إجابة صحيحة)</span>`;
            } else {
                msg.innerHTML = `<svg class="w-10 h-10 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-rose-700">(إجابة خاطئة)</span>`;
            }

            document.getElementById(`score-${secId}`).innerText = toEasternNum(state.score);
            updateProgressBar(secId);
            checkOverallCompletion();
        }

        // إعادة محاولة القسم
        function retrySection(secId) {
            const state = appState.sections[secId];
            state.score = 0;
            state.answeredCount = 0;
            state.answeredQuestions.clear();

            document.getElementById(`score-${secId}`).innerText = toEasternNum(0);
            updateProgressBar(secId);

            // إعادة بناء الأسئلة لضمان العشوائية للخيارات (Shuffle) من جديد
            renderQuestionsHTML(secId);
            
            // الانتقال والتمرير إلى أعلى القسم بدقة
            switchTab(secId);
            checkOverallCompletion();
        }

        // التحقق من إنهاء جميع التدريبات لإظهار زر التقييم النهائي
        function checkOverallCompletion() {
            let totalAnswered = 0;
            for (let k in appState.sections) {
                totalAnswered += appState.sections[k].answeredCount;
            }
            
            const btn = document.getElementById('btn-final-eval');
            if (btn) {
                if (totalAnswered === appState.totalQuestionsCount) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            }
        }

        // إظهار نافذة التقييم النهائي المستقلة في نهاية التطبيق
        function showFinalEvaluation() {
            let totalScore = 0;
            for (let k in appState.sections) {
                totalScore += appState.sections[k].score;
            }
            
            const percentage = Math.round((totalScore / appState.totalQuestionsCount) * 100);
            document.getElementById('final-score-display').innerText = `${toEasternNum(totalScore)} / ${toEasternNum(appState.totalQuestionsCount)}`;
            
            let msg = percentage === 100 ? 'مستوى متميز! لقد أتقنت جميع قواعد الدرس ببراعة.' : 
                      percentage >= 85 ? 'مستوى جيد جدًا! استيعابك للقواعد ممتاز.' : 
                      percentage >= 70 ? 'مستوى جيد! إجاباتك موفقة، راجع التوضيحات لتلافي الأخطاء البسيطة.' : 
                      'تحتاج إلى مراجعة الدرس بتركيز أكبر، لا تيأس وحاول من جديد!';
            
            document.getElementById('final-message').innerText = msg;
            
            const modal = document.getElementById('final-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => { 
                modal.classList.remove('opacity-0'); 
                modalContent.classList.remove('scale-95'); 
                document.getElementById('final-progress-bar').style.width = `${percentage}%`; 
            }, 10);
        }

        // إغلاق النافذة
        function closeFinalModal() {
            const modal = document.getElementById('final-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('final-progress-bar').style.width = '0%';
            }, 300);
        }

        // تهيئة وبدء التطبيق
        document.addEventListener('DOMContentLoaded', () => { 
            initAppState(); 
            renderApp(); 
        });
    </script>
</body>
</html>
