                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

        let appState = {
            sections: {},
            totalQuestionsCount: 0
        };

        function initAppState() {
            appState.sections = {};
            appState.totalQuestionsCount = 0;
            quizData.forEach(sec => {
                const qCount = sec.questions ? sec.questions.length : 0;
                appState.sections[sec.id] = {
                    score: 0,
                    answeredCount: 0,
                    totalQuestions: qCount,
                    answeredQuestions: new Set()
                };
                appState.totalQuestionsCount += qCount;
            });
        }

        // ==========================================
        function switchTab(targetId) {
            // إخفاء كافة التبويبات وإزالة التنسيق النشط
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            
            // إزالة تنسيق النشاط من كل الأزرار بدون مؤثرات Hover
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-brand-700', 'text-brand-800', 'bg-brand-50');
                b.classList.add('border-transparent', 'text-slate-600');
            });

            // إظهار التبويب المطلوب
            const panel = document.getElementById(`panel-${targetId}`);
            if (panel) panel.classList.add('active');
            
            // تمييز زر التبويب النشط وتمريره أفقياً بسلاسة
            const activeBtn = document.getElementById(`btn-${targetId}`);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-slate-600');
                activeBtn.classList.add('border-brand-700', 'text-brand-800', 'bg-brand-50');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // تحديث شريط التقدم للقسم الجديد
            updateProgressBar(targetId);

            // الانتقال بسلاسة إلى أعلى محتوى القسم
            setTimeout(() => {
                if (panel) {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 50);
        }

        function updateProgressBar(secId) {
            const state = appState.sections[secId];
            if (!state || state.totalQuestions === 0) {
                document.getElementById('section-progress-bar').style.width = '0%';
                return;
            }
            const percentage = Math.round((state.answeredCount / state.totalQuestions) * 100);
            document.getElementById('section-progress-bar').style.width = `${percentage}%`;
        }

        function renderApp() {
            const tabsList = document.getElementById('tabs-list');
            const mainContent = document.getElementById('main-content');
            tabsList.innerHTML = '';
            mainContent.innerHTML = '';

            quizData.forEach((sec, index) => {
                const isFirst = index === 0;
                const isLast = index === quizData.length - 1;

                // إنشاء أزرار التبويبات (بدون Hover)
                const li = document.createElement('li');
                li.className = 'whitespace-nowrap shrink-0';
                li.innerHTML = `
                    <button onclick="switchTab('${sec.id}')" id="btn-${sec.id}" class="tab-btn px-5 sm:px-6 py-1 text-xl font-semibold border-b-[3px] outline-none ${isFirst ? 'border-brand-700 text-brand-800 bg-brand-50' : 'border-transparent text-slate-600'}">
                        ${sec.title}
                    </button>
                `;
                tabsList.appendChild(li);

                // إنشاء حاوية القسم
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `panel-${sec.id}`;
                sectionDiv.className = `tab-content pt-8 ${isFirst ? 'active' : ''}`;

                let subtitleHtml = '';
                if (sec.type === 'summary') {
                    subtitleHtml = '<p class="text-slate-600 text-xl sm:text-2xl leading-relaxed max-w-3xl mx-auto font-medium">مراجعة سريعة لأهم قواعد الدرس قبل البدء في التدريبات.</p>';
                } else if (sec.id === 'meanings') {
                    subtitleHtml = '<p class="text-slate-600 text-xl sm:text-2xl leading-relaxed max-w-3xl mx-auto font-medium">اقرأ الأسئلة بعناية، واختر الإجابة الصحيحة. يمكنك الاستعانة بـ (التلميح 💡) إذا واجهت صعوبة.</p>';
                }

                sectionDiv.innerHTML += `
                    <div class="text-center mb-10">
                        <h2 class="text-3xl sm:text-4xl font-bold text-slate-800 ${subtitleHtml ? 'mb-4' : ''}">إنّ وأخواتها</h2>
                        ${subtitleHtml}
                    </div>
                `;

                if (sec.type === 'summary') {
                    sectionDiv.innerHTML += `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                <div class="flex items-center gap-4 mb-5">
                                    <div class="bg-blue-100 p-3 rounded-full text-blue-600 shrink-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    </div>
                                    <h3 class="text-xl sm:text-2xl font-semibold text-slate-700">العمل والتأثير</h3>
                                </div>
                                <p class="text-slate-600 text-xl sm:text-2xl leading-relaxed font-medium">
                                    حروف ناسخة تدخل على <strong class="text-slate-800 font-semibold">الجملة الاسمية</strong>، فتنصب المبتدأ ويُسمى (اسمها)، وترفع الخبر ويُسمى (خبرها).
                                </p>
                            </div>

                            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 md:row-span-2">
                                <div class="flex items-center gap-4 mb-5">
                                    <div class="bg-amber-100 p-3 rounded-full text-amber-600 shrink-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                                    </div>
                                    <h3 class="text-xl sm:text-2xl font-semibold text-slate-700">معاني الحروف</h3>
                                </div>
                                <ul class="text-slate-600 text-xl sm:text-2xl leading-relaxed space-y-4 font-medium">
                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-semibold">إنّ، أنّ:</span> تفيدان التوكيد.</li>
                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-semibold">كأنّ:</span> تفيد التشبيه.</li>
                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-semibold">لكنّ:</span> تفيد الاستدراك.</li>
                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-semibold">ليت:</span> تفيد التمني (طلب المحال).</li>
                                    <li class="flex items-start gap-2"><span class="text-brand-700 font-semibold">لعلّ:</span> تفيد الترجي (توقع الممكن).</li>
                                </ul>
                            </div>

                            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                <div class="flex items-center gap-4 mb-5">
                                    <div class="bg-emerald-100 p-3 rounded-full text-emerald-600 shrink-0">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                    </div>
                                    <h3 class="text-xl sm:text-2xl font-semibold text-slate-700">أنواع الخبر</h3>
                                </div>
                                <ul class="text-slate-600 text-xl sm:text-2xl leading-relaxed space-y-3 font-medium">
                                    <li><span class="font-semibold text-slate-700">مفرد:</span> ليس جملة ولا شبه جملة.</li>
                                    <li><span class="font-semibold text-slate-700">جملة:</span> اسمية أو فعلية.</li>
                                    <li><span class="font-semibold text-slate-700">شبه جملة:</span> ظرف أو جار ومجرور.</li>
                                </ul>
                            </div>
                        </div>

                        <div class="flex justify-center mt-12 mb-8">
                            <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-8 py-4 rounded-2xl font-semibold flex items-center gap-3 text-xl sm:text-2xl outline-none shadow-sm btn-interact">
                                ابدأ التدريبات
                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            </button>
                        </div>
                    `;
                    mainContent.appendChild(sectionDiv);
                    return;
                }

                // حاوية الأسئلة
                const questionsContainer = document.createElement('div');
                questionsContainer.id = `q-container-${sec.id}`;
                sectionDiv.appendChild(questionsContainer);

                // أزرار نهاية القسم (بدون زر النتيجة النهائية لأنه يظهر آلياً)
                let footerBtns = `
                    <button onclick="retrySection('${sec.id}')" class="bg-slate-800 text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-3 text-xl sm:text-2xl outline-none btn-interact shadow-sm flex-grow sm:flex-grow-0">
                        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        إعادة المحاولة
                    </button>
                `;
                
                if (!isLast) {
                    footerBtns += `
                        <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-3 text-xl sm:text-2xl outline-none btn-interact shadow-sm flex-grow sm:flex-grow-0">
                            القسم التالي
                            <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        </button>
                    `;
                }

                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-10 p-6 sm:p-8 bg-white rounded-[2rem] shadow-sm border border-slate-200">
                        <div class="text-2xl sm:text-3xl font-semibold text-slate-700 mb-6 sm:mb-0 text-center sm:text-right">
                            درجة القسم: <span id="score-${sec.id}" class="text-brand-600 font-bold">٠</span> / ${toEasternNum(sec.questions.length)}
                        </div>
                        <div class="flex flex-wrap items-center justify-center gap-4 w-full sm:w-auto">
                            ${footerBtns}
                        </div>
                    </div>
                `;
                
                mainContent.appendChild(sectionDiv);
                renderQuestionsHTML(sec.id);
            });
            
            if (quizData.length > 0) updateProgressBar(quizData[0].id);
        }

        function renderQuestionsHTML(secId) {
            const sec = quizData.find(s => s.id === secId);
            if (sec.type === 'summary') return;

            const container = document.getElementById(`q-container-${secId}`);
            
            const html = sec.questions.map((q, qIndex) => {
                let displayOptions = [...q.options];
                if (q.type === 'tf') {
                    displayOptions = ['صواب', 'خطأ'];
                } else {
                    displayOptions = shuffleArray(displayOptions);
                }

                return `
                    <div class="bg-white p-6 sm:p-10 rounded-[2rem] shadow-sm border border-slate-200 mb-8" id="card-${secId}-${qIndex}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-5 mb-8">
                            <h3 class="text-xl sm:text-2xl font-semibold text-slate-800 leading-relaxed flex-1">
                                <span class="text-brand-600 ml-1 font-semibold whitespace-nowrap">السؤال ${toEasternNum(qIndex + 1)}:</span>
                                ${q.q}
                            </h3>
                            <button onclick="toggleHint('${secId}', ${qIndex})" class="flex items-center justify-center gap-2 text-amber-600 bg-amber-50/80 px-5 py-3 rounded-xl font-medium border border-amber-200 text-xl sm:text-2xl outline-none shrink-0 btn-interact w-full sm:w-auto mt-4 sm:mt-0">
                                💡 تلميح
                            </button>
                        </div>
                        
                        <div id="hint-${secId}-${qIndex}" class="hidden mb-6 p-5 bg-amber-50/50 border border-amber-100 text-amber-800 rounded-2xl text-xl sm:text-2xl font-medium leading-relaxed">
                            ${q.hint}
                        </div>

                        <div class="flex flex-wrap justify-center mx-auto max-w-2xl gap-4 mb-2" id="opts-${secId}-${qIndex}">
                            ${displayOptions.map(opt => `
                                <button onclick="selectAnswer('${secId}', ${qIndex}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[160px] text-xl sm:text-2xl font-semibold bg-slate-50 border-2 border-slate-200 text-slate-700 py-4 px-6 rounded-2xl text-center outline-none btn-interact transition-colors">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        <div id="feedback-${secId}-${qIndex}" class="hidden mt-8 pt-6 border-t border-slate-100">
                            <div id="res-msg-${secId}-${qIndex}" class="font-semibold text-2xl mb-4 flex items-center gap-2"></div>
                            <div class="text-slate-700 font-medium leading-relaxed text-xl sm:text-2xl bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <span class="font-semibold text-brand-700 text-xl sm:text-2xl block mb-2 underline decoration-brand-200 underline-offset-8">التوضيح:</span>
                                ${q.exp}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        function toggleHint(secId, qIdx) {
            const hintDiv = document.getElementById(`hint-${secId}-${qIdx}`);
            hintDiv.classList.toggle('hidden');
        }

        function selectAnswer(secId, qIdx, selectedOpt) {
            const state = appState.sections[secId];
            if (state.answeredQuestions.has(qIdx)) return; 
            
            state.answeredQuestions.add(qIdx);
            state.answeredCount += 1;
            
            const q = quizData.find(s => s.id === secId).questions[qIdx];
            const isCorrect = selectedOpt === q.correct;
            
            if (isCorrect) state.score += 1;

            const buttons = document.getElementById(`opts-${secId}-${qIdx}`).querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                if (btn.innerText.trim() === q.correct) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700', 'border-slate-200');
                    btn.classList.add('bg-emerald-50', 'border-emerald-400', 'text-emerald-800');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700', 'border-slate-200');
                    btn.classList.add('bg-rose-50', 'border-rose-400', 'text-rose-800');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            const feedbackDiv = document.getElementById(`feedback-${secId}-${qIdx}`);
            const msg = document.getElementById(`res-msg-${secId}-${qIdx}`);
            feedbackDiv.classList.remove('hidden');
            
            if (isCorrect) {
                msg.innerHTML = `<svg class="w-8 h-8 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-700">(إجابة صحيحة)</span>`;
            } else {
                msg.innerHTML = `<svg class="w-8 h-8 text-rose-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-rose-700">(إجابة خاطئة)</span>`;
            }

            document.getElementById(`score-${secId}`).innerText = toEasternNum(state.score);
            updateProgressBar(secId);
            checkOverallCompletion();
        }

        function retrySection(secId) {
            const state = appState.sections[secId];
            state.score = 0;
            state.answeredCount = 0;
            state.answeredQuestions.clear();

            document.getElementById(`score-${secId}`).innerText = toEasternNum(0);
            updateProgressBar(secId);
            
            // إخفاء التقييم النهائي لو كان ظاهراً
            hideFinalEvaluation();

            renderQuestionsHTML(secId);
            switchTab(secId);
            checkOverallCompletion();
        }

        // ==========================================
        // منطق النتيجة الختامية وزر ابدأ من جديد
        // ==========================================
        function checkOverallCompletion() {
            let totalAnswered = 0;
            for (let k in appState.sections) {
                totalAnswered += appState.sections[k].answeredCount;
            }
            if (totalAnswered === appState.totalQuestionsCount && appState.totalQuestionsCount > 0) {
                showFinalEvaluation();
            }
        }

        function showFinalEvaluation() {
            let totalScore = 0;
            for (let k in appState.sections) {
                totalScore += appState.sections[k].score;
            }
            const percentage = Math.round((totalScore / appState.totalQuestionsCount) * 100);
            
            let msg = percentage === 100 ? 'مستوى متميز! لقد أتقنت جميع قواعد الدرس ببراعة.' : 
                      percentage >= 85 ? 'مستوى جيد جدًا! استيعابك للقواعد ممتاز.' : 
                      percentage >= 70 ? 'مستوى جيد! إجاباتك موفقة، راجع التوضيحات لتلافي الأخطاء البسيطة.' : 
                      'تحتاج إلى مراجعة الدرس بتركيز أكبر، لا تيأس وحاول من جديد!';

            const container = document.getElementById('final-evaluation-container');
            
            container.innerHTML = `
                <div class="inline-flex items-center justify-center w-24 h-24 bg-brand-50 text-brand-600 rounded-full mb-6 shadow-sm border border-brand-100">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-3xl sm:text-4xl font-bold text-slate-800 mb-6">التقييم الشامل</h2>
                <div class="bg-slate-50 rounded-3xl p-6 sm:p-10 mb-8 border border-slate-200 max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-5">
                        <span class="text-xl sm:text-2xl font-semibold text-slate-700">الدرجة الإجمالية:</span>
                        <span class="text-3xl sm:text-4xl font-bold text-brand-600">${toEasternNum(totalScore)} <span class="text-2xl text-slate-400 mx-1">/</span> ${toEasternNum(appState.totalQuestionsCount)}</span>
                    </div>
                    <div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden mb-6">
                        <div class="bg-brand-500 h-full rounded-full transition-all duration-1000 ease-out" style="width: ${percentage}%"></div>
                    </div>
                    <p class="text-xl sm:text-2xl font-semibold text-slate-800 leading-relaxed">${msg}</p>
                </div>
                <button onclick="resetAll()" class="bg-slate-800 text-white px-10 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3 text-xl sm:text-2xl outline-none shadow-md btn-interact mx-auto transition-colors duration-300">
                    <svg class="w-8 h-8 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    ابدأ من جديد
                </button>
            `;
            
            container.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('opacity-0', 'translate-y-4');
                container.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        function hideFinalEvaluation() {
            const container = document.getElementById('final-evaluation-container');
            if (container) {
                container.classList.add('hidden', 'opacity-0', 'translate-y-4');
                container.innerHTML = '';
            }
        }

        function resetAll() {
            initAppState();
            hideFinalEvaluation();
            renderApp();
            switchTab(quizData[0].id);
        }

        // تهيئة وبدء التطبيق
        document.addEventListener('DOMContentLoaded', () => { 
            initAppState(); 
            renderApp(); 
        });
    </script>
</body>
</html>
