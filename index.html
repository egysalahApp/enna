            },
            {
                id: 'action',
                title: 'عمل الحروف',
                questions: [
                    { q: 'تدخل (إنّ وأخواتها) على الجملة:', options: ['الاسمية', 'الفعلية', 'شبه الجملة'], correct: 'الاسمية', hint: 'تذكر نوع الجملة التي تتكون من مبتدأ وخبر.', exp: 'تدخل هذه الحروف على الجملة الاسمية (المبتدأ والخبر) فقط.' },

            {

                questions: [
                    { q: 'إنّ السماءَ صافيةٌ. علامة نصب اسم إنّ:', options: ['الفتحة', 'الكسرة', 'الألف'], correct: 'الفتحة', hint: 'الاسم (السماء) مفرد، تذكر علامة النصب الأصلية للمفرد.', exp: '(السماءَ) اسم مفرد، لذلك ينصب بالفتحة.' },
                    { q: 'ليت الطالبين ناجحان. علامة نصب اسم ليت:', options: ['الألف', 'الياء', 'الكسرة'], correct: 'الياء', hint: 'الكلمة تدل على اثنين (مثنى).', exp: '(الطالبين) مثنى، وعلامة نصبه الياء.' },
                    { q: 'لعلّ العاملين مخلصون في عملهم. علامة نصب اسم لعلّ:', options: ['الياء', 'الواو', 'الفتحة'], correct: 'الياء', hint: 'الكلمة جمع مذكر سالم.', exp: '(العاملين) جمع مذكر سالم، وعلامة نصبه الياء.' },
                    { q: 'إنّ الأمهاتِ رحيماتٌ. علامة نصب اسم إنّ:', options: ['الفتحة', 'الكسرة', 'السكون'], correct: 'الكسرة', hint: 'الكلمة جمع مؤنث سالم، وله علامة نصب فرعية مميزة.', exp: '(الأمهاتِ) اسم إن منصوب وعلامة نصبه الكسرة نيابة عن الفتحة لأنه جمع مؤنث سالم.' },
                    { q: 'كأنّ ..... أسدٌ. الكلمة المناسبة لملء الفراغ:', options: ['أبوك', 'أبيك', 'أباك'], correct: 'أباك', hint: 'اسم كأنّ يكون منصوبًا، والأسماء الخمسة تنصب بعلامة خاصة.', exp: '(أباك) اسم كأنّ منصوب وعلامة نصبه الألف لأنه من الأسماء الخمسة.' },
                    { q: 'في جملة (إنك مجتهدٌ)، اسم إنّ هو:', options: ['كاف الخطاب', 'مجتهد', 'ضمير مستتر'], correct: 'كاف الخطاب', hint: 'ابحث عن الضمير المتصل بالحرف الناسخ.', exp: '(كاف الخطاب) ضمير متصل مبني في محل نصب اسم إنّ.' },
                    { q: 'الضمير المتصل بحرف من أخوات (إنّ) يكون دائمًا في محل رفع اسمها.', type: 'tf', options: ['صواب', 'خطأ'], correct: 'خطأ', hint: 'تذكر عمل إنّ وأخواتها في المبتدأ (الاسم).', exp: 'الضمير المتصل يكون دائمًا في محل (نصب) اسم إنّ وليس في محل رفع.' },

                    { q: 'لعلّ المطرَ (يهطلُ). نوع الخبر هو:', options: ['جملة فعلية', 'مفرد', 'شبه جملة'], correct: 'جملة فعلية', hint: 'الكلمة بين القوسين تدل على حدث في زمن معين.', exp: 'الخبر الجملة الفعلية (يهطل) المكونة من الفعل والفاعل المستتر.' },
                    { q: 'إنّ الحديقةَ (أشجارُها مثمرةٌ). نوع الخبر:', options: ['مفرد', 'جملة فعلية', 'جملة اسمية'], correct: 'جملة اسمية', hint: 'الخبر يبدأ باسم + هاء، فكّر!', exp: 'الخبر الجملة الاسمية (أشجارُها مثمرةٌ) المكونة من مبتدأ وخبر.' },

        let appState = { sections: {}, totalQuestionsCount: 0 };

        function initAppState() {
            quizData.forEach(sec => {
                appState.sections[sec.id] = { score: 0, answeredCount: 0, total: sec.questions.length, answeredIndices: new Set() };
                appState.totalQuestionsCount += sec.questions.length;
            });
        }

        // ==================================================
        // دالة التبديل والتمرير الدقيق لمحتوى القسم
        // ==================================================
        function switchTab(targetId) {
            // 1. إخفاء كافة الأقسام وتحديث مظهر التبويبات
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-brand-600', 'text-brand-700', 'bg-brand-50');
                b.classList.add('border-transparent', 'text-slate-400');
            });

            const panel = document.getElementById(`panel-${targetId}`);
            if (panel) panel.classList.add('active');
            
            const activeBtn = document.getElementById(`btn-${targetId}`);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-slate-400');
                activeBtn.classList.add('border-brand-600', 'text-brand-700', 'bg-brand-50');
                // تمرير شريط التبويبات أفقيًا ليظهر التبويب المختار في المنتصف
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            
            // 2. التمرير الدقيق (Smooth Scroll) إلى أعلى محتوى القسم (أسفل الشريط الثابت)
            setTimeout(() => {
                if (panel) {
                    const stickyNav = document.getElementById('sticky-nav');
                    const navHeight = stickyNav ? stickyNav.offsetHeight : 60;
                    // حساب النقطة الدقيقة: موضع القسم - ارتفاع الشريط الثابت - مساحة إضافية للتنفس (15px)
                    const yOffset = panel.getBoundingClientRect().top + window.scrollY - navHeight - 15;
                    window.scrollTo({ top: yOffset, behavior: 'smooth' });
                }
            }, 50); // تأخير بسيط لضمان قيام المتصفح برسم العنصر (display: block)

            // 3. تحديث شريط التقدم للقسم
            updateProgressBar(targetId);
        }

        function updateProgressBar(secId) {
            const state = appState.sections[secId];
            if (!state) return;
            const percentage = Math.round((state.answeredCount / state.total) * 100);
            document.getElementById('global-progress-bar').style.width = `${percentage}%`;
        }

        function renderApp() {
            const tabsList = document.getElementById('tabs-list');
            const mainContent = document.getElementById('main-content');
            tabsList.innerHTML = '';
            mainContent.innerHTML = '';

            quizData.forEach((sec, index) => {
                const isFirst = index === 0;
                const isLast = index === quizData.length - 1;

                // التبويبات العلوية
                const li = document.createElement('li');
                li.className = 'whitespace-nowrap shrink-0';
                li.innerHTML = `<button onclick="switchTab('${sec.id}')" id="btn-${sec.id}" class="tab-btn px-6 py-2 text-lg font-bold border-b-[3px] transition-all duration-300 rounded-t-xl btn-interact ${isFirst ? 'border-brand-600 text-brand-700 bg-brand-50' : 'border-transparent text-slate-400'}">${sec.title}</button>`;
                tabsList.appendChild(li);

                // حاوية محتوى القسم
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `panel-${sec.id}`;
                sectionDiv.className = `tab-content pt-4 sm:pt-8 ${isFirst ? 'active' : ''}`;

                // عنوان الدرس يظهر في القسم الأول فقط
                if (isFirst) {
                    sectionDiv.innerHTML += `
                        <div class="text-center mb-12 animation-fadeIn">
                            <h2 class="text-5xl font-bold text-slate-900 mb-6">إنّ وأخواتها</h2>
                            <p class="text-slate-600 text-xl leading-relaxed max-w-2xl mx-auto font-medium">تدريبات تفاعلية شاملة لدرس الحروف الناسخة. اقرأ السؤال بدقة، واستخدم التلميح عند الحاجة.</p>
                        </div>
                    `;
                }

                // عرض الأسئلة
                const questionsHTML = sec.questions.map((q, qIdx) => `
                    <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-8 transition-all hover:shadow-md" id="card-${sec.id}-${qIdx}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 sm:gap-6 mb-6">
                            <h3 class="question-text font-bold text-slate-800"><span class="text-brand-600 ml-1">السؤال ${toArNum(qIdx + 1)}:</span>${q.q}</h3>
                            <button onclick="toggleHint('${sec.id}', ${qIdx})" class="flex items-center gap-2 text-amber-600 bg-amber-50 px-5 py-2.5 rounded-2xl hover:bg-amber-100 transition-all shrink-0 font-bold border border-amber-100/50 btn-interact">💡 تلميح</button>
                        </div>
                        <div id="hint-${sec.id}-${qIdx}" class="hidden mb-6 p-5 bg-amber-50/50 border border-amber-100 text-amber-900 rounded-2xl text-lg font-medium leading-relaxed">${q.hint}</div>
                        <div class="flex flex-wrap gap-3 sm:gap-4 mb-2" id="opts-${sec.id}-${qIdx}">
                            ${q.options.map(opt => `<button onclick="selectAnswer('${sec.id}', ${qIdx}, '${opt}')" class="opt-btn btn-interact flex-grow sm:flex-grow-0 min-w-[140px] sm:min-w-[160px] text-lg sm:text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-3 sm:py-4 px-6 rounded-2xl hover:bg-white hover:border-brand-500 hover:text-brand-700 transition-all text-center">${opt}</button>`).join('')}
                        </div>
                        <div id="feedback-${sec.id}-${qIdx}" class="hidden mt-8 pt-8 border-t border-slate-100">
                            <div id="res-msg-${sec.id}-${qIdx}" class="font-bold text-xl sm:text-2xl mb-4 flex items-center gap-2"></div>
                            <div class="text-slate-700 font-medium leading-relaxed text-lg bg-slate-50 p-6 rounded-2xl border border-slate-100"><span class="font-bold text-brand-700 text-xl block mb-2 underline decoration-brand-200 underline-offset-8">التوضيح:</span>${q.exp}</div>
                        </div>
                    </div>
                `).join('');

                sectionDiv.innerHTML += questionsHTML;

                // أزرار نهاية القسم
                let footerBtns = `<button onclick="retrySection('${sec.id}')" class="bg-slate-900 text-white px-8 sm:px-10 py-3.5 sm:py-4 rounded-2xl hover:bg-slate-800 transition-all font-bold flex items-center gap-3 shadow-lg btn-interact"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>إعادة المحاولة</button>`;
                
                if (!isLast) {
                    footerBtns += `<button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-8 sm:px-10 py-3.5 sm:py-4 rounded-2xl hover:bg-brand-700 transition-all font-bold flex items-center gap-3 shadow-lg btn-interact">القسم التالي <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>`;
                } else {
                    footerBtns += `<button onclick="showFinalEvaluation()" id="btn-final-eval" class="hidden bg-emerald-600 text-white px-8 sm:px-10 py-3.5 sm:py-4 rounded-2xl hover:bg-emerald-700 transition-all font-bold flex items-center gap-3 shadow-lg btn-interact">عرض النتيجة النهائية <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>`;
                }

                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-12 p-6 sm:p-8 bg-white rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="text-2xl sm:text-3xl font-bold text-slate-800 mb-6 sm:mb-0">درجة القسم: <span id="score-${sec.id}" class="text-brand-600">٠</span> / ${toArNum(sec.questions.length)}</div>
                        <div class="flex flex-wrap items-center justify-center gap-4 w-full sm:w-auto">${footerBtns}</div>
                    </div>
                `;
                mainContent.appendChild(sectionDiv);
            });
            if (quizData.length > 0) updateProgressBar(quizData[0].id);
        }

        function toggleHint(secId, qIdx) { 
            const hintDiv = document.getElementById(`hint-${secId}-${qIdx}`);
            hintDiv.classList.toggle('hidden'); 
        }

        function selectAnswer(secId, qIdx, selectedOpt) {
            const state = appState.sections[secId];
            if (state.answeredIndices.has(qIdx)) return;
            
            state.answeredIndices.add(qIdx);
            state.answeredCount += 1;
            
            const q = quizData.find(s => s.id === secId).questions[qIdx];
            const isCorrect = selectedOpt === q.correct;
            
            if (isCorrect) state.score += 1;

            const buttons = document.getElementById(`opts-${secId}-${qIdx}`).querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                if (btn.innerText.trim() === q.correct) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700', 'shadow-md');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            const f = document.getElementById(`feedback-${secId}-${qIdx}`);
            const msg = document.getElementById(`res-msg-${secId}-${qIdx}`);
            f.classList.remove('hidden');
            
            if (isCorrect) {
                msg.innerHTML = `<svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-600">(إجابة صحيحة)</span>`;
            } else {
                msg.innerHTML = `<svg class="w-8 h-8 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-rose-600">(إجابة خاطئة)</span>`;
            }
            
            document.getElementById(`score-${secId}`).innerText = toArNum(state.score);
            updateProgressBar(secId);
            checkOverallCompletion();
        }

        function retrySection(secId) {
            const state = appState.sections[secId];
            state.score = 0; 
            state.answeredCount = 0; 
            state.answeredIndices.clear();
            
            document.getElementById(`score-${secId}`).innerText = toArNum(0);
            
            const sec = quizData.find(s => s.id === secId);
            sec.questions.forEach((q, qIdx) => {
                document.getElementById(`feedback-${secId}-${qIdx}`).classList.add('hidden');
                document.getElementById(`hint-${secId}-${qIdx}`).classList.add('hidden');
                document.getElementById(`opts-${secId}-${qIdx}`).innerHTML = q.options.map(opt => `<button onclick="selectAnswer('${secId}', ${qIdx}, '${opt}')" class="opt-btn btn-interact flex-grow sm:flex-grow-0 min-w-[140px] sm:min-w-[160px] text-lg sm:text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-3 sm:py-4 px-6 rounded-2xl hover:bg-white hover:border-brand-500 hover:text-brand-700 transition-all text-center">${opt}</button>`).join('');
            });
            
            switchTab(secId);
            checkOverallCompletion();
        }

        function checkOverallCompletion() {
            let total = 0;
            for (let k in appState.sections) total += appState.sections[k].answeredIndices.size;
            const btn = document.getElementById('btn-final-eval');
            if (btn) btn.classList.toggle('hidden', total !== appState.totalQuestionsCount);
        }

        function showFinalEvaluation() {
            let score = 0;
            for (let k in appState.sections) score += appState.sections[k].score;
            const percentage = Math.round((score / appState.totalQuestionsCount) * 100);
            
            document.getElementById('final-score-display').innerText = `${toArNum(score)} / ${toArNum(appState.totalQuestionsCount)}`;
            
            let message = percentage === 100 ? 'مستوى متميز جدًا! لقد أتقنت القواعد ببراعة.' : 
                          percentage >= 85 ? 'عمل رائع! استيعابك للقواعد ممتاز.' : 
                          percentage >= 70 ? 'مستوى جيد! راجع التوضيحات لتلافي الأخطاء البسيطة.' : 
                          'تحتاج إلى مراجعة الدرس مرة أخرى بتركيز، بالتوفيق!';
            document.getElementById('final-message').innerText = message;
            
            const modal = document.getElementById('final-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('final-progress-bar').style.width = `${percentage}%`;
            }, 10);
        }

        function closeFinalModal() {
            const modal = document.getElementById('final-modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 500);
        }

        document.addEventListener('DOMContentLoaded', () => { 
            initAppState(); 
            renderApp(); 
        });
    </script>
</body>
</html>
