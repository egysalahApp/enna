<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنّ وأخواتها - العربية السهلة</title>
    
    <!-- تضمين خط Readex Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- تضمين Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- إعدادات Tailwind لتخصيص الخطوط والألوان -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Readex Pro"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* منع الضغط على الأزرار بعد الإجابة */
        .disabled-btn {
            pointer-events: none;
        }
        /* تكبير النص في الأسئلة لزيادة الوضوح */
        .question-text {
            font-size: 1.35rem;
            line-height: 2rem;
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <!-- الترويسة -->
    <header class="w-full py-8 flex flex-col items-center justify-center bg-white border-b border-slate-100">
        <a href="https://www.youtube.com/egysalah" target="_blank" class="group flex items-center gap-3 no-underline transition-transform hover:scale-105 bg-transparent">
            <!-- شعار يوتيوب -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 text-red-600">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
            </svg>
            <h1 class="text-4xl font-bold text-slate-800 group-hover:text-red-600 transition-colors">العربية السهلة</h1>
        </a>
        <p class="text-slate-500 mt-2 text-lg font-medium">محمود صلاح</p>
    </header>

    <!-- شريط التنقل (التبويبات) -->
    <nav class="w-full bg-white shadow-sm mb-8">
        <div class="max-w-4xl mx-auto px-4">
            <ul id="tabs-list" class="flex justify-start sm:justify-center gap-2 sm:gap-6 overflow-x-auto hide-scrollbar py-1">
                <!-- تُضاف التبويبات برمجيًا -->
            </ul>
        </div>
    </nav>

    <!-- المحتوى الرئيسي للأسئلة -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-4 pb-16" id="main-content">
        <!-- تُضاف الأقسام برمجيًا -->
    </main>

    <!-- التذييل -->
    <footer class="w-full py-6 bg-white border-t border-slate-200 mt-auto">
        <div class="text-center">
            <a href="https://www.youtube.com/egysalah" target="_blank" class="text-slate-500 hover:text-brand-600 font-medium transition-colors font-bold">
                جميع الحقوق محفوظة لقناة العربية السهلة
            </a>
        </div>
    </footer>

    <!-- المنطق البرمجي وبيانات الأسئلة -->
    <script>

                    },
                    {
                        q: 'تفيد (أنّ) التشبيه في الجملة الاسمية.',

                        correct: 'خطأ',
                        hint: 'حروف التوكيد تبدأ بالهمزة دائمًا.',

            {
                id: 'action',

                    {

            {

                    },

                        exp: '(الأمهاتِ) اسم إن منصوب وعلامة نصبه الكسرة نيابة عن الفتحة لأنه جمع مؤنث سالم.'
                    },
                    {
                        q: 'كأنّ ..... أسدٌ. الكلمة المناسبة لملء الفراغ:',
                        type: 'mcq',
                        options: ['أبوك', 'أبيك', 'أباك'],
                        correct: 'أباك',
                        hint: 'اسم كأنّ يكون منصوبًا، والأسماء الخمسة تنصب بعلامة خاصة.',
                        exp: '(أباك) اسم كأنّ منصوب وعلامة نصبه الألف لأنه من الأسماء الخمسة.'
                    },
                    {
                        q: 'في جملة (إنك مجتهدٌ)، اسم إنّ هو:',
                        type: 'mcq',
                        options: ['كاف الخطاب', 'مجتهد', 'ضمير مستتر'],
                        correct: 'كاف الخطاب',
                        hint: 'ابحث عن الضمير المتصل بالحرف الناسخ.',

                    },
                    {
                        q: 'الضمير المتصل بحرف من أخوات (إنّ) يكون دائمًا في محل رفع اسمها.',

                        correct: 'خطأ',
                        hint: 'تذكر عمل إنّ وأخواتها في المبتدأ (الاسم).',

                ]
            },
            {
                id: 'predicate_types',
                title: 'أنواع الخبر',
                questions: [
                    {
                        q: 'إنّ الصبرَ (مفتاحٌ) للفرج. نوع الخبر:',
                        type: 'mcq',
                        options: ['مفرد', 'شبه جملة', 'جملة اسمية'],
                        correct: 'مفرد',
                        hint: 'الخبر كلمة واحدة أتمت المعنى، وليست فعلًا ولا ظرفًا.',

                    },
                    {
                        q: 'لعلّ المطرَ (يهطلُ). نوع الخبر:',
                        type: 'mcq',

                        correct: 'جملة فعلية',
                        hint: 'الكلمة بين القوسين تدل على حدث في زمن معين.',

                    },
                    {
                        q: 'إنّ الحديقةَ (أشجارُها مثمرةٌ). نوع الخبر:',
                        type: 'mcq',
                        options: ['مفرد', 'جملة فعلية', 'جملة اسمية'],
                        correct: 'جملة اسمية',
                        hint: 'الخبر يبدأ باسم + هاء، فكّر!',
                        exp: 'الخبر الجملة الاسمية (أشجارُها مثمرةٌ) المكونة من مبتدأ وخبر.'
                    },
                    {
                        q: 'إنّ العلمَ (قبلَ) المال. نوع الخبر:',
                        type: 'mcq',
                        options: ['شبه جملة (ظرف)', 'مفرد', 'جملة فعلية'],
                        correct: 'شبه جملة (ظرف)',
                        hint: 'الكلمة بين القوسين تدل على زمان أو مكان.',
                        exp: 'الخبر هنا شبه جملة لأنه يبدأ بظرف (قبلَ).'
                    },
                    {
                        q: 'إنّ النظافةَ (من الإيمان). نوع الخبر:',
                        type: 'mcq',

                        correct: 'شبه جملة (جار ومجرور)',

                    {

                        options: ['مفرد', 'شبه جملة (جار ومجرور)', 'جملة فعلية'],

        let appState = {};

        function initAppState() {
            quizData.forEach(sec => {
                appState[sec.id] = {
                    score: 0,
                    answeredQuestions: new Set()
                };
            });
        }

        function renderApp() {
            const tabsList = document.getElementById('tabs-list');
            const mainContent = document.getElementById('main-content');
            
            tabsList.innerHTML = '';
            mainContent.innerHTML = '';

            quizData.forEach((sec, index) => {
                const isFirst = index === 0;

                // التبويبات
                const li = document.createElement('li');
                li.className = 'whitespace-nowrap';
                li.innerHTML = `
                    <button onclick="switchTab('${sec.id}')" id="btn-${sec.id}" class="tab-btn px-4 py-3 text-lg font-bold border-b-4 transition-all duration-200 ${isFirst ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:text-brand-600 hover:border-brand-200'}">
                        ${sec.title}
                    </button>
                `;
                tabsList.appendChild(li);

                // محتوى القسم
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `panel-${sec.id}`;
                sectionDiv.className = `tab-content ${isFirst ? 'active' : ''}`;

                if (isFirst) {
                    sectionDiv.innerHTML += `
                        <div class="text-center mb-10">
                            <h2 class="text-3xl sm:text-4xl font-bold text-brand-900 mb-4">إنّ وأخواتها</h2>
                            <p class="text-slate-600 text-lg leading-relaxed max-w-2xl mx-auto font-medium">
                                مرحبًا بك في هذا التطبيق التفاعلي. اقرأ الأسئلة بعناية، واختر الإجابة الصحيحة. 
                                يمكنك الاستعانة بـ (التلميح) إذا واجهت صعوبة.
                            </p>
                        </div>
                    `;
                }

                // الأسئلة
                const questionsHTML = sec.questions.map((q, qIndex) => `
                    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200 mb-6" id="card-${sec.id}-${qIndex}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-5">
                            <h3 class="question-text font-bold text-slate-800">
                                <span class="text-brand-600 me-1">السؤال ${toEasternNum(qIndex + 1)}:</span>
                                ${q.q}
                            </h3>
                            <button onclick="toggleHint('${sec.id}', ${qIndex})" class="flex items-center gap-1.5 text-amber-600 bg-amber-50 px-4 py-2 rounded-xl hover:bg-amber-100 transition-colors shrink-0 font-bold">
                                💡 تلميح
                            </button>
                        </div>
                        
                        <div id="hint-${sec.id}-${qIndex}" class="hidden mb-6 p-4 bg-amber-50 border border-amber-100 text-amber-800 rounded-xl text-lg font-medium leading-relaxed">
                            ${q.hint}
                        </div>

                        <div class="flex flex-wrap gap-3 mb-2" id="opts-${sec.id}-${qIndex}">
                            ${q.options.map(opt => `
                                <button onclick="selectAnswer('${sec.id}', ${qIndex}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[140px] text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-3 px-5 rounded-xl hover:bg-slate-100 hover:border-slate-300 transition-all text-center">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        <div id="feedback-${sec.id}-${qIndex}" class="hidden mt-6 pt-5 border-t border-slate-100">
                            <div id="res-msg-${sec.id}-${qIndex}" class="font-bold text-xl mb-3 flex items-center gap-2"></div>
                            <div class="text-slate-700 font-medium leading-relaxed text-lg bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <span class="font-bold text-brand-700">التوضيح:</span> ${q.exp}
                            </div>
                        </div>
                    </div>
                `).join('');

                sectionDiv.innerHTML += questionsHTML;

                // التذييل وإعادة المحاولة
                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-10 p-6 sm:p-8 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <div class="text-2xl font-bold text-slate-800 mb-4 sm:mb-0">
                            نتيجة القسم: <span id="score-${sec.id}" class="text-brand-600">٠</span> / ${toEasternNum(sec.questions.length)}
                        </div>
                        <button onclick="retrySection('${sec.id}')" class="bg-slate-800 text-white px-6 py-3 rounded-xl hover:bg-slate-700 transition-colors font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            إعادة المحاولة
                        </button>
                    </div>
                `;

                mainContent.appendChild(sectionDiv);
            });
        }

        function switchTab(targetId) {
            document.querySelectorAll('.tab-content').forEach(panel => {
                panel.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-brand-600', 'text-brand-700');
                btn.classList.add('border-transparent', 'text-slate-500');
            });

            document.getElementById(`panel-${targetId}`).classList.add('active');
            
            const activeBtn = document.getElementById(`btn-${targetId}`);
            activeBtn.classList.remove('border-transparent', 'text-slate-500');
            activeBtn.classList.add('border-brand-600', 'text-brand-700');
        }

        function toggleHint(secId, qIndex) {
            const hintDiv = document.getElementById(`hint-${secId}-${qIndex}`);
            if (hintDiv.classList.contains('hidden')) {
                hintDiv.classList.remove('hidden');
                hintDiv.classList.add('block');
            } else {
                hintDiv.classList.add('hidden');
                hintDiv.classList.remove('block');
            }
        }

        function selectAnswer(secId, qIndex, selectedOpt) {
            if (appState[secId].answeredQuestions.has(qIndex)) return;
            
            appState[secId].answeredQuestions.add(qIndex);
            
            const section = quizData.find(s => s.id === secId);
            const question = section.questions[qIndex];
            const isCorrect = selectedOpt === question.correct;

            if (isCorrect) {
                appState[secId].score += 1;
            }

            const optsContainer = document.getElementById(`opts-${secId}-${qIndex}`);
            const buttons = optsContainer.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                btn.classList.remove('hover:bg-slate-100', 'hover:border-slate-300', 'bg-slate-50', 'text-slate-700');
                
                if (btn.innerText.trim() === question.correct) {
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700', 'font-bold');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                } else {
                    btn.classList.add('opacity-50', 'bg-slate-50', 'border-slate-200');
                }
            });

            const feedbackDiv = document.getElementById(`feedback-${secId}-${qIndex}`);
            const resMsg = document.getElementById(`res-msg-${secId}-${qIndex}`);
            
            feedbackDiv.classList.remove('hidden');
            feedbackDiv.classList.add('block', 'animate-[fadeIn_0.5s_ease-in-out]');

            if (isCorrect) {
                resMsg.innerHTML = `
                    <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span class="text-emerald-600">(إجابة صحيحة)</span>
                `;
            } else {
                resMsg.innerHTML = `
                    <svg class="w-6 h-6 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    <span class="text-rose-600">(إجابة خاطئة)</span>
                `;
            }

            document.getElementById(`score-${secId}`).innerText = toEasternNum(appState[secId].score);
        }

        function retrySection(secId) {
            appState[secId].score = 0;
            appState[secId].answeredQuestions.clear();

            document.getElementById(`score-${secId}`).innerText = toEasternNum(0);

            const section = quizData.find(s => s.id === secId);
            
            section.questions.forEach((q, qIndex) => {
                const feedbackDiv = document.getElementById(`feedback-${secId}-${qIndex}`);
                feedbackDiv.classList.add('hidden');
                feedbackDiv.classList.remove('block', 'animate-[fadeIn_0.5s_ease-in-out]');
                
                const hintDiv = document.getElementById(`hint-${secId}-${qIndex}`);
                hintDiv.classList.add('hidden');
                hintDiv.classList.remove('block');

                const optsContainer = document.getElementById(`opts-${secId}-${qIndex}`);
                optsContainer.innerHTML = q.options.map(opt => `
                    <button onclick="selectAnswer('${secId}', ${qIndex}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[140px] text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-3 px-5 rounded-xl hover:bg-slate-100 hover:border-slate-300 transition-all text-center">
                        ${opt}
                    </button>
                `).join('');
            });
            
            document.getElementById(`panel-${secId}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initAppState();
            renderApp();
        });

    </script>
</body>
</html>
