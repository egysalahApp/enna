                    { q: 'كأنّ محمدًا (ناجحٌ). نوع الخبر في الجملة مفرد.', type: 'tf', options: ['صواب', 'خطأ'], correct: 'صواب', hint: 'الخبر كلمة واحدة أتمت المعنى.', exp: 'كلمة (ناجحٌ) اسم مفرد وليست فعلًا أو ظرفًا.' },
                    { q: 'لعلّ (في السفرِ) الخيرَ. نوع الخبر في الجملة هو:', type: 'mcq', options: ['مفرد', 'شبه جملة', 'جملة اسمية'], correct: 'شبه جملة', hint: 'الخبر هنا تقدم على الاسم وبدأ بحرف جر.', exp: '(في السفرِ) جار ومجرور، فهو خبر شبه جملة مقدم.' },
                    { q: 'إنّ محمدًا (لَناجحٌ). نوع الخبر مفرد رغم وجود اللام.', type: 'tf', options: ['صواب', 'خطأ'], correct: 'صواب', hint: 'اللام مفتوحة (للتوكيد) وليست حرف جر؛ فهي لا تؤثر على الإعراب.', exp: 'اللام هي اللام المزحلقة للتوكيد، والخبر هو (ناجحٌ) وهو خبر مفرد.' }
                ]
            }
        ];

        // حالة التطبيق
        let appState = {
            sections: {},
            totalOverallQuestions: 0
        };

        // تهيئة البيانات
        function initAppState() {
            quizData.forEach(sec => {
                appState.sections[sec.id] = {
                    score: 0,
                    answeredCount: 0,
                    totalQuestions: sec.questions.length,
                    answeredQuestions: new Set()
                };
                appState.totalOverallQuestions += sec.questions.length;
            });
        }

        // ==========================================
        // الدالة الموحدة لتبديل التبويبات والتمرير (switchTab)
        // ==========================================
        function switchTab(targetId) {
            // 1. إدارة المحتوى والتبويبات بصريًا
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-brand-600', 'text-brand-700', 'bg-brand-50');
                b.classList.add('border-transparent', 'text-slate-500');
            });

            const panel = document.getElementById(`panel-${targetId}`);
            if (panel) panel.classList.add('active');
            
            const activeBtn = document.getElementById(`btn-${targetId}`);
            if (activeBtn) {
                activeBtn.classList.remove('border-transparent', 'text-slate-500');
                activeBtn.classList.add('border-brand-600', 'text-brand-700', 'bg-brand-50');
                // ضمان رؤية التبويب النشط على الهواتف
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            
            // 2. التمرير التلقائي الناعم إلى أعلى الصفحة تماماً (Top 0)
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

            // 3. تحديث شريط التقدم للقسم المختار
            updateSectionProgressBar(targetId);
        }

        // تحديث شريط التقدم النحيف المدمج
        function updateSectionProgressBar(secId) {
            const state = appState.sections[secId];
            if (!state) return;
            const percentage = Math.round((state.answeredCount / state.totalQuestions) * 100);
            document.getElementById('section-progress-bar').style.width = `${percentage}%`;
        }

        // بناء الواجهة الرئيسية
        function renderApp() {
            const tabsList = document.getElementById('tabs-list');
            const mainContent = document.getElementById('main-content');
            tabsList.innerHTML = '';
            mainContent.innerHTML = '';

            quizData.forEach((sec, index) => {
                const isFirst = index === 0;
                const isLast = index === quizData.length - 1;

                // إنشاء زر التبويب
                const li = document.createElement('li');
                li.className = 'whitespace-nowrap shrink-0';
                li.innerHTML = `
                    <button onclick="switchTab('${sec.id}')" id="btn-${sec.id}" class="tab-btn px-6 py-2 text-lg font-bold border-b-[3px] rounded-t-xl transition-all duration-300 hover:text-brand-600 ${isFirst ? 'border-brand-600 text-brand-700 bg-brand-50' : 'border-transparent text-slate-500'}">
                        ${sec.title}
                    </button>
                `;
                tabsList.appendChild(li);

                // إنشاء حاوية القسم
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `panel-${sec.id}`;
                sectionDiv.className = `tab-content ${isFirst ? 'active' : ''}`;

                // عنوان التطبيق تحت التبويبات في التبويب الأول فقط
                if (isFirst) {
                    sectionDiv.innerHTML += `
                        <div class="text-center mb-12 pt-8 animation-fadeIn">
                            <h2 class="text-5xl font-bold text-slate-900 mb-6">إنّ وأخواتها</h2>
                            <p class="text-slate-600 text-xl leading-relaxed max-w-2xl mx-auto font-medium">
                                تدريبات تفاعلية شاملة لدرس الحروف الناسخة. اقرأ السؤال بدقة، واستخدم التلميح عند الحاجة.
                            </p>
                        </div>
                    `;
                }

                // بناء الأسئلة
                const qHTML = sec.questions.map((q, qIdx) => `
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-8 transition-all hover:shadow-md" id="card-${sec.id}-${qIdx}">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-5 mb-6">
                            <h3 class="question-text font-bold text-slate-800 leading-relaxed">
                                <span class="text-brand-600 ml-1">السؤال ${toEasternNum(qIdx + 1)}:</span>
                                ${q.q}
                            </h3>
                            <button onclick="toggleHint('${sec.id}', ${qIdx})" class="flex items-center gap-2 text-amber-600 bg-amber-50 px-5 py-2.5 rounded-2xl hover:bg-amber-100 transition-all shrink-0 font-bold border border-amber-100/50">
                                💡 تلميح
                            </button>
                        </div>
                        
                        <div id="hint-${sec.id}-${qIdx}" class="hidden mb-6 p-6 bg-amber-50/50 border border-amber-100 text-amber-900 rounded-2xl text-lg font-medium leading-relaxed">
                            ${q.hint}
                        </div>

                        <div class="flex flex-wrap gap-4 mb-2" id="opts-${sec.id}-${qIdx}">
                            ${q.options.map(opt => `
                                <button onclick="selectAnswer('${sec.id}', ${qIdx}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[160px] text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-4 px-8 rounded-2xl hover:bg-white hover:border-brand-500 hover:text-brand-700 hover:scale-[1.02] transition-all text-center">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>

                        <div id="feedback-${sec.id}-${qIdx}" class="hidden mt-8 pt-8 border-t border-slate-100">
                            <div id="res-msg-${sec.id}-${qIdx}" class="font-bold text-2xl mb-4 flex items-center gap-2"></div>
                            <div class="text-slate-700 font-medium leading-relaxed text-lg bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <span class="font-bold text-brand-700 text-xl block mb-2 underline decoration-brand-200 underline-offset-8">التوضيح:</span>
                                ${q.exp}
                            </div>
                        </div>
                    </div>
                `).join('');

                sectionDiv.innerHTML += qHTML;

                // أزرار نهاية القسم
                let footerBtns = `
                    <button onclick="retrySection('${sec.id}')" class="bg-slate-900 text-white px-10 py-4 rounded-2xl hover:bg-slate-800 transition-all font-bold flex items-center gap-3 shadow-lg transform hover:-translate-y-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        إعادة المحاولة
                    </button>
                `;
                
                if (!isLast) {
                    footerBtns += `
                        <button onclick="switchTab('${quizData[index + 1].id}')" class="bg-brand-600 text-white px-10 py-4 rounded-2xl hover:bg-brand-700 transition-all font-bold flex items-center gap-3 shadow-lg transform hover:-translate-y-1">
                            القسم التالي
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        </button>
                    `;
                } else {
                    footerBtns += `
                        <button onclick="showFinalEvaluation()" id="btn-final-eval" class="hidden bg-emerald-600 text-white px-10 py-4 rounded-2xl hover:bg-emerald-700 transition-all font-bold flex items-center gap-3 shadow-lg transform hover:-translate-y-1">
                            عرض النتيجة النهائية
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    `;
                }

                sectionDiv.innerHTML += `
                    <div class="flex flex-col sm:flex-row items-center justify-between mt-12 p-8 bg-white rounded-3xl shadow-sm border border-slate-100">
                        <div class="text-3xl font-bold text-slate-800 mb-8 sm:mb-0">
                            درجة القسم: <span id="score-${sec.id}" class="text-brand-600">٠</span> / ${toEasternNum(sec.questions.length)}
                        </div>
                        <div class="flex flex-wrap items-center justify-center gap-4 w-full sm:w-auto">
                            ${footerBtns}
                        </div>
                    </div>
                `;
                mainContent.appendChild(sectionDiv);
            });
            
            // تهيئة شريط التقدم المبدئي
            if (quizData.length > 0) updateSectionProgressBar(quizData[0].id);
        }

        // إظهار/إخفاء التلميح
        function toggleHint(secId, qIdx) {
            const h = document.getElementById(`hint-${secId}-${qIdx}`);
            h.classList.toggle('hidden');
        }

        // اختيار الإجابة
        function selectAnswer(secId, qIdx, selectedOpt) {
            const state = appState.sections[secId];
            if (state.answeredQuestions.has(qIdx)) return;
            state.answeredQuestions.add(qIdx);
            state.answeredCount += 1;
            
            const q = quizData.find(s => s.id === secId).questions[qIdx];
            const isCorrect = selectedOpt === q.correct;
            if (isCorrect) state.score += 1;

            // تحديث الأزرار
            const buttons = document.getElementById(`opts-${secId}-${qIdx}`).querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.add('disabled-btn');
                if (btn.innerText.trim() === q.correct) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700', 'shadow-md');
                } else if (btn.innerText.trim() === selectedOpt && !isCorrect) {
                    btn.classList.remove('bg-slate-50', 'text-slate-700');
                    btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            // إظهار التغذية الراجعة
            const f = document.getElementById(`feedback-${secId}-${qIdx}`);
            const msg = document.getElementById(`res-msg-${secId}-${qIdx}`);
            f.classList.remove('hidden');
            
            if (isCorrect) {
                msg.innerHTML = `<svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-600">(إجابة صحيحة)</span>`;
            } else {
                msg.innerHTML = `<svg class="w-8 h-8 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg><span class="text-rose-600">(إجابة خاطئة)</span>`;
            }

            document.getElementById(`score-${secId}`).innerText = toEasternNum(state.score);
            updateSectionProgressBar(secId);
            checkOverallCompletion();
        }

        // إعادة محاولة القسم
        function retrySection(secId) {
            const state = appState.sections[secId];
            state.score = 0; state.answeredCount = 0; state.answeredQuestions.clear();
            document.getElementById(`score-${secId}`).innerText = toEasternNum(0);
            
            const sec = quizData.find(s => s.id === secId);
            sec.questions.forEach((q, qIdx) => {
                document.getElementById(`feedback-${secId}-${qIdx}`).classList.add('hidden');
                document.getElementById(`hint-${secId}-${qIdx}`).classList.add('hidden');
                document.getElementById(`opts-${secId}-${qIdx}`).innerHTML = q.options.map(opt => `
                    <button onclick="selectAnswer('${secId}', ${qIdx}, '${opt}')" class="opt-btn flex-grow sm:flex-grow-0 min-w-[160px] text-xl font-bold bg-slate-50 border-2 border-slate-100 text-slate-700 py-4 px-8 rounded-2xl hover:bg-white hover:border-brand-500 hover:text-brand-700 hover:scale-[1.02] transition-all text-center">
                        ${opt}
                    </button>
                `).join('');
            });
            
            // العودة للأعلى آلياً لمستوى التبويبات
            switchTab(secId);
            checkOverallCompletion();
        }

        // فحص اكتمال التطبيق
        function checkOverallCompletion() {
            let total = 0;
            for (let k in appState.sections) total += appState.sections[k].answeredCount;
            const btn = document.getElementById('btn-final-eval');
            if (btn) btn.classList.toggle('hidden', total !== appState.totalOverallQuestions);
        }

        // عرض التقييم النهائي
        function showFinalEvaluation() {
            let score = 0;
            for (let k in appState.sections) score += appState.sections[k].score;
            const percentage = Math.round((score / appState.totalOverallQuestions) * 100);
            document.getElementById('final-score-display').innerText = `${toEasternNum(score)} / ${toEasternNum(appState.totalOverallQuestions)}`;
            
            let message = percentage === 100 ? 'مستوى متميز جدًا! لقد أتقنت القواعد ببراعة.' : percentage >= 85 ? 'عمل رائع! استيعابك للقواعد ممتاز.' : percentage >= 70 ? 'مستوى جيد! راجع التوضيحات لتلافي الأخطاء البسيطة.' : 'حاول مراجعة الدرس مرة أخرى بتركيز، بالتوفيق!';
            document.getElementById('final-message').innerText = message;
            
            const modal = document.getElementById('final-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('final-progress-bar').style.width = `${percentage}%`;
            }, 10);
        }

        function closeFinalModal() {
            const modal = document.getElementById('final-modal');
            modal.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 500);
        }

        document.addEventListener('DOMContentLoaded', () => { 
            initAppState(); 
            renderApp(); 
        });
    </script>
</body>
</html>
